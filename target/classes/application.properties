spring.application.name=risiko-backend
server.port=8080

# Cambia username e password con i tuoi dati MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/risiko?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Chiave segreta (minimo 32 caratteri) — cambiala in produzione!
jwt.secret=RisiKoSuperSecretKey2024_Torneo_XYZ987654321_ABCDEF
jwt.expiration=86400000

spring.web.resources.static-locations=classpath:/static/

app.cors.allowed-origins=http://localhost:4200,http://localhost:8080
